name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/zuriapp-frontend

jobs:
  # ── Job 1: Build check ──────────────────────────────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_STORE_NAME: "Zuri Market"

  # ── Job 2: Security scanning ────────────────────────────────────────────────
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit — scan dependencies
        run: npm audit --audit-level=critical

      - name: Trivy — scan filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

  # ── Job 3: Build and push Docker image ─────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main'
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-arg VITE_STORE_NAME="Zuri Market" \
            -t ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }} \
            -t ${{ env.IMAGE_NAME }}:latest .

      - name: Trivy — scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Push to DockerHub
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
